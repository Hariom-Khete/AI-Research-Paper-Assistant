<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Paper Assistant</title>
  <style>
    :root {
      --ink: #162033;
      --muted: #5d687a;
      --mint: #82c8b7;
      --coral: #f37f6b;
      --gold: #f4bd54;
      --blue: #2f6f9f;
      --white: #fffaf3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 20%, rgba(130, 200, 183, 0.38), transparent 26%),
        radial-gradient(circle at 84% 22%, rgba(243, 127, 107, 0.28), transparent 24%),
        linear-gradient(135deg, #fffaf3 0%, #f7f1e8 48%, #e9f4f1 100%);
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 250, 243, 0.88);
      box-shadow: 6px 6px 0 var(--ink);
      transform: translateX(-50%);
      backdrop-filter: blur(10px);
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    nav a:hover,
    nav a.active {
      background: var(--gold);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 104px 32px 40px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      color: var(--ink);
      background: var(--gold);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 6px 6px 0 var(--ink);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .button.secondary { background: var(--white); }

    @media (max-width: 640px) {
      nav {
        width: calc(100% - 28px);
        justify-content: center;
      }

      nav a {
        flex: 1;
        padding: 0 8px;
        font-size: 0.92rem;
      }

      main {
        padding: 96px 18px 28px;
      }
    }

    .hero {
      width: min(100%, 1040px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 48px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--blue);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(3rem, 7vw, 6.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    h1 span { color: var(--coral); }

    .subtitle {
      max-width: 620px;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .paper-stack {
      position: relative;
      min-height: 470px;
    }

    .sheet {
      position: absolute;
      inset: 34px 0 auto auto;
      width: min(100%, 320px);
      min-height: 400px;
      padding: 28px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--white);
      box-shadow: 14px 14px 0 var(--ink);
      transform: rotate(3deg);
    }

    .sheet::before,
    .sheet::after {
      content: "";
      position: absolute;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #d9eee8;
      z-index: -1;
    }

    .sheet::before {
      inset: 18px 18px -18px -18px;
      transform: rotate(-7deg);
    }

    .sheet::after {
      inset: 38px 38px -38px -38px;
      background: #fbded8;
      transform: rotate(-13deg);
    }

    .sheet-title {
      height: 18px;
      width: 72%;
      border-radius: 999px;
      background: var(--ink);
      margin-bottom: 28px;
    }

    .line {
      height: 10px;
      border-radius: 999px;
      background: #d8d0c6;
      margin: 14px 0;
    }

    .line.short { width: 68%; }

    .insight {
      margin-top: 34px;
      padding: 18px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--mint);
      font-weight: 800;
      line-height: 1.35;
    }

    .spark {
      position: absolute;
      width: 74px;
      height: 74px;
      right: 28px;
      top: 0;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 6px 6px 0 var(--ink);
      font-size: 2rem;
      font-weight: 900;
      transform: rotate(-10deg);
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .paper-stack {
        min-height: 420px;
        order: -1;
      }

      .sheet {
        left: 12px;
        right: auto;
        width: calc(100% - 42px);
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a class="active" href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <section class="hero" aria-label="Welcome">
      <div>
        <p class="eyebrow">Smart literature support</p>
        <h1>Welcome to <span>AI Research Paper Assistant</span></h1>
        <p class="subtitle">
          Explore papers, organize ideas, and turn dense research into clear direction with a calm, focused assistant built for discovery.
        </p>
        <div class="actions" aria-label="Quick actions">
          <a class="button" href="about.html">Learn About Us</a>
          <a class="button secondary" href="contact.html">Contact Us</a>
        </div>
      </div>

      <div class="paper-stack" aria-hidden="true">
        <div class="spark">AI</div>
        <article class="sheet">
          <div class="sheet-title"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line short"></div>
          <div class="line"></div>
          <div class="line short"></div>
          <div class="insight">Find themes, summaries, and next questions faster.</div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
