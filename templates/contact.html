<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AI Research Paper Assistant</title>
  <style>
    :root {
      --ink: #162033;
      --muted: #5d687a;
      --mint: #82c8b7;
      --coral: #f37f6b;
      --gold: #f4bd54;
      --blue: #2f6f9f;
      --white: #fffaf3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 20%, rgba(130, 200, 183, 0.38), transparent 26%),
        radial-gradient(circle at 84% 22%, rgba(243, 127, 107, 0.28), transparent 24%),
        linear-gradient(135deg, #fffaf3 0%, #f7f1e8 48%, #e9f4f1 100%);
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 250, 243, 0.88);
      box-shadow: 6px 6px 0 var(--ink);
      transform: translateX(-50%);
      backdrop-filter: blur(10px);
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    nav a:hover,
    nav a.active {
      background: var(--gold);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 104px 32px 40px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      color: var(--ink);
      background: var(--gold);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 6px 6px 0 var(--ink);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .button.secondary { background: var(--white); }

    @media (max-width: 640px) {
      nav {
        width: calc(100% - 28px);
        justify-content: center;
      }

      nav a {
        flex: 1;
        padding: 0 8px;
        font-size: 0.92rem;
      }

      main {
        padding: 96px 18px 28px;
      }
    }

    .contact {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(300px, 1.1fr);
      gap: 34px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 6vw, 5.4rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    h1 span { color: var(--coral); }

    .lead {
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(1.06rem, 2vw, 1.22rem);
      line-height: 1.75;
    }

    .contact-card {
      padding: 28px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--white);
      box-shadow: 12px 12px 0 var(--ink);
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 13px 14px;
      color: var(--ink);
      background: #fffdf8;
      font: inherit;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
    }

    .button {
      width: 100%;
      margin-top: 18px;
      cursor: pointer;
    }

    .direct {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .direct a {
      color: var(--ink);
      font-weight: 800;
      text-decoration-color: var(--coral);
      text-decoration-thickness: 3px;
    }

    @media (max-width: 820px) {
      .contact { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a class="active" href="/contact">Contact</a>
    <a href="/summarizer">Summarizer</a>
  </nav>

  <main>
    <section class="contact" aria-label="Contact AI Research Paper Assistant">
      <div>
        <p class="eyebrow">Contact</p>
        <h1>Have a research idea? <span>Let us know</span>.</h1>
        <p class="lead">
          Send a note about your project, papers, or workflow. This page is ready to connect to a real backend whenever you want the form to submit messages.
        </p>
        <div class="direct">
          <a href="mailto:hello@airesearchassistant.test">hello@airesearchassistant.test</a>
          <a href="/">Return to the welcome page</a>
        </div>
      </div>

      <form class="contact-card">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com">

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us what you are researching"></textarea>

        <button class="button" type="button">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
